apiVersion: 'autoscaling/v2'
kind: 'HorizontalPodAutoscaler'
metadata:
  name: 'customers-api-hpa'
  namespace: 'customers-ns'
  labels:
    app: 'customers-api'
spec:
  scaleTargetRef:
    apiVersion: 'apps/v1'
    kind: 'Deployment'
    name: 'customers-api'
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: 'Resource'
      resource:
        name: 'cpu'
        target:
          type: 'Utilization'
          averageUtilization: 50
    - type: 'Resource'
      resource:
        name: 'memory'
        target:
          type: 'Utilization'
          averageUtilization: 70
